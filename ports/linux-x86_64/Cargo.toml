[package]
name = "locus-linux-x86_64"
version = "0.0.0"
edition = "2021"
description = "Linux x86-64 sidecar driver for Locus."
publish = false

# Keep this sidecar out of the root workspace while the Linux port settles.
[workspace]

[workspace.dependencies]
inkwell = { version = "=0.9.0", default-features = false, features = ["llvm22-1", "target-x86"] }
llvm-sys = { version = "=221.0.1", default-features = false, features = ["force-static"] }

[dependencies]
locus = { path = "../../locus" }
locus-asm = { path = "../../vendor/wfasm" }
locus-libc = { path = "../../locus-libc" }
locus-llvm = { path = "../../locus-llvm", default-features = false }
locus-rt = { path = "../../locus-rt" }
inkwell.workspace = true
llvm-sys.workspace = true

[[bin]]
name = "locusc"
path = "src/main.rs"
